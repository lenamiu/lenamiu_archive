<!DOCTYPE html>
<html>
<head>
  <title>Lenamiu Archive</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial;
      background: #0f0f14;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 20px;
    }

    .map {
      position: relative;
      height: 500px;
      margin-top: 40px;
      border: 2px solid #333;
      border-radius: 12px;
    }

    .spot {
      position: absolute;
      padding: 14px;
      background: #222;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .spot:hover {
      background: #444;
      transform: scale(1.05);
    }

    .vlogs { top: 120px; left: 140px; }
    .interviews { top: 200px; left: 260px; }
    .shows { top: 320px; left: 140px; }
    .magazine { top: 220px; left: 60px; }
  </style>
</head>

<body>

<h1>Lenamiu Archive</h1>
<p>Explore the fandom world</p>

<div class="map">

  <a class="spot" style="top:120px;left:140px;" href="vlogs.html">🎥 Vlogs</a>
  <a class="spot" style="top:200px;left:260px;" href="interviews.html">☕ Interviews</a>
  <a class="spot" style="top:320px;left:140px;" href="shows.html">📺 Shows</a>
  <a class="spot" style="top:220px;left:60px;" href="magazine.html">📰 Magazine</a>

</div>

</body>
</html>
